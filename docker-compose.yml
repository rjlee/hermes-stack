networks:
  hermesnet:
    driver: bridge
services:
  camofox-browser:
    depends_on:
      hermes:
        condition: service_healthy
    env_file:
    - ./data/camofox-browser/.env
    environment:
    - CAMOFOX_PORT=9377
    - CAMOFOX_HEADLESS=virtual
    - CAMOFOX_VNC_TIMEOUT_MS=300000
    healthcheck:
      interval: 30s
      retries: 6
      start_period: 60s
      test:
      - CMD
      - python3
      - -c
      - import urllib.request; urllib.request.urlopen('http://localhost:9377/health')
      timeout: 10s
    image: ghcr.io/rjlee/camofox-browser:latest
    networks:
    - hermesnet
    restart: unless-stopped
    user: 0:0
    volumes:
    - ./data/camofox-browser:/home/node/.camofox
  hermes:
    command: gateway run
    env_file:
    - ./data/.env
    - ./data/hermes/.env
    environment:
      API_SERVER_ENABLED: 'true'
      API_SERVER_HOST: 0.0.0.0
      CAMOFOX_URL: http://camofox-browser:9377
      OPENCODE_PROJECT_DIR: ${WORKSPACE_DIR:-./workspace}
    healthcheck:
      interval: 30s
      retries: 6
      start_period: 120s
      test:
      - CMD
      - python3
      - -c
      - import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://localhost:8642/health').status
        == 200 else 1)
      timeout: 10s
    image: ${HERMES_IMAGE:-nousresearch/hermes-agent:latest}
    logging:
      driver: json-file
      options:
        max-file: '5'
        max-size: 20m
    mem_limit: 4g
    mem_reservation: 2g
    networks:
    - hermesnet
    ports:
    - 5173:5173
    restart: unless-stopped
    shm_size: 1g
    user: 0:0
    volumes:
    - ./data/hermes:/opt/data
    - ${WORKSPACE_DIR:-./workspace}:/workspace
  open-webui:
    depends_on:
      hermes:
        condition: service_healthy
    env_file:
    - ./data/.env
    - ./data/open-webui/.env
    environment:
      OPENAI_API_BASE_URL: http://hermes:8642/v1
      OPENAI_API_KEY: ${API_SERVER_KEY}
    healthcheck:
      interval: 30s
      retries: 6
      start_period: 60s
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8080/healthz
      timeout: 10s
    image: ghcr.io/open-webui/open-webui:latest
    logging:
      driver: json-file
      options:
        max-file: '3'
        max-size: 10m
    mem_limit: 2g
    mem_reservation: 1g
    networks:
    - hermesnet
    ports:
    - 8001:8080
    restart: unless-stopped
    user: 0:0
    volumes:
    - ./data/open-webui:/app/backend/data
