services:
  camofox-browser:
    image: ghcr.io/rjlee/camofox-browser:latest
    user: "0:0"
    # No host ports are published – the service is reachable only on the internal Docker network
    # (e.g., http://camofox-browser:9377/…) by other containers such as Hermes.
    # If you need external access for debugging, you can temporarily add ports here.
    env_file:
      - ./data/camofox-browser/.env
    environment:
      - CAMOFOX_PORT=9377
      - CAMOFOX_HEADLESS=virtual
      - CAMOFOX_VNC_TIMEOUT_MS=300000
    # Add a healthcheck so other services can wait for the browser to be ready
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9377/health')"]
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 60s
    # Restart the container automatically if it crashes
    restart: unless-stopped
    # camofox-browser waits for hermes to be healthy before starting
    depends_on:
      hermes:
        condition: service_healthy
    volumes:
      - ./data/camofox-browser:/home/node/.camofox
    networks:
      - hermesnet

  open-webui:
    image: ghcr.io/open-webui/open-webui:latest
    user: "0:0"
    ports:
      - "8001:8080"
    env_file:
      - ./data/.env
      - ./data/open-webui/.env
    environment:
      OPENAI_API_BASE_URL: "http://hermes:8642/v1"
      OPENAI_API_KEY: "${API_SERVER_KEY}"
    volumes:
      - ./data/open-webui:/app/backend/data
    restart: unless-stopped
    mem_limit: 2g
    mem_reservation: 1g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      hermes:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 60s
    networks:
      - hermesnet

  hermes:
    image: ${HERMES_IMAGE:-nousresearch/hermes-agent:latest}
    user: "0:0"
    entrypoint: ["sh", "-c", "bash /opt/hermes-init/bootstrap.sh && exec /opt/hermes/docker/entrypoint.sh gateway run"]
    env_file:
      - ./data/.env
      - ./data/hermes/.env
    environment:
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: "0.0.0.0"
      CAMOFOX_URL: "http://camofox-browser:9377"
      OPENCODE_PROJECT_DIR: ${WORKSPACE_DIR:-./workspace}
      HERMES_UID: "1000"
      HERMES_GID: "1000"
    volumes:
      - ./data/hermes:/opt/data
      - ./hermes-init:/opt/hermes-init:ro
      - ${WORKSPACE_DIR:-./workspace}:/workspace
    shm_size: "1g"
    mem_limit: 4g
    mem_reservation: 2g
    restart: unless-stopped
    healthcheck:
      test: [
        "CMD",
        "python3",
        "-c",
        "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://localhost:8642/health').status == 200 else 1)"
      ]
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - hermesnet

networks:
  hermesnet:
    driver: bridge
